name: Deploy nais-job

on: [workflow_dispatch]

jobs:
  build:
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.docker-push.outputs.image }}
    steps:
      - name: Checkout v5.0.1
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Nais Docker Build Push
        uses: nais/docker-build-push@078e460885ed0424b60d45ce9220b4be1748be9d # v0
        id: docker-push
        with:
          team: platforce
          dockerfile: Dockerfile-job
  deploy-dev:
    name: Deploy job to dev-gcp
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout v5.0.1
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Nais Deploy v2
        uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: eventlog-fetch-job.yaml
          VAR: image=${{ needs.build.outputs.image }}
  deploy-prod:
    name: Deploy job to prod-gcp
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout v5.0.1
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Nais Deploy v2
        uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: eventlog-fetch-job.yaml
          VAR: image=${{ needs.build.outputs.image }}