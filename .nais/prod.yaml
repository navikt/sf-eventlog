apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: sf-eventlog
  namespace: platforce
  labels:
    team: platforce
spec:
  image: "{{ image }}"
  port: 8080
  replicas:
    min: 1
    max: 1
  liveness:
    path: /internal/isAlive
  readiness:
    path: /internal/isReady
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    logging:
      destinations:
        - id: loki
  resources:
    limits:
      memory: 6Gi
    requests:
      cpu: 10m
      memory: 1Gi
  gcp:
    sqlInstances:
      - type: POSTGRES_16
        tier: db-f1-micro
        databases:
          - name: sf-eventlog-prod
  ingresses:
    - "https://sf-eventlog.intern.nav.no"
  #  azure:
  #    application:
  #      enabled: true
  #      allowAllUsers: true
  #      claims:
  #        extra:
  #          - azp_name
  #          - NAVident
  #    sidecar:
  #      enabled: false
  #  accessPolicy:
  #    inbound:
  #      rules:
  #        - application: salesforce
  #          namespace: teamcrm
  #          cluster: prod-external
  accessPolicy:
    inbound:
      rules:
        - application: eventlog-fetch-job
    outbound:
      rules:
        - application: logging
          namespace: nais-system
      external:
        - host: login.salesforce.com
        - host: navdialog.my.salesforce.com
  envFrom:
    - configmap: salesforce-common
    - configmap: sf-eventlog
    - secret: sf-eventlog
  env:
    - name: CONTEXT
      value: "PROD"